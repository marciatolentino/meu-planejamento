<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Planejamento</title>
<meta name="theme-color" content="#FAF8F6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meu Planejamento">
<link rel="apple-touch-icon" id="apple-icon">
<link rel="icon" id="favicon" type="image/png">
<link rel="manifest" id="manifest-link">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#FAF8F6;min-height:100vh;color:#2C2A28;}
input,button,select{font-family:'Inter',sans-serif;}
button{cursor:pointer;}
#hdr{padding:1rem 1rem .85rem;border-bottom:1px solid rgba(0,0,0,.08);background:#fff;}
#hdr .sub{font-size:9px;letter-spacing:.15em;color:#9B72BC;text-transform:uppercase;font-weight:600;margin-bottom:4px;}
#hdr h1{font-size:18px;font-weight:600;margin-bottom:.8rem;}
.nav{display:flex;align-items:center;justify-content:space-between;}
.nav button{background:none;border:none;font-size:22px;color:#aaa;padding:0 6px;line-height:1;}
.nav span{font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
#tabs{display:flex;background:#fff;border-bottom:1px solid rgba(0,0,0,.08);}
#tabs button{flex:1;padding:10px 2px;background:none;border:none;border-bottom:2px solid transparent;color:#aaa;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;}
#tabs button.active{border-bottom:2px solid #9B72BC;color:#9B72BC;}
#card-sel{display:flex;gap:6px;padding:10px 10px 0;overflow-x:auto;background:#FAF8F6;}
#card-sel::-webkit-scrollbar{display:none;}
#card-sel button{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1.5px solid transparent;font-size:11px;font-weight:600;background:#fff;}
#card-sel button.active{border-color:currentColor;}
.section{padding:10px 10px 0;}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;margin-bottom:8px;}
.card-hdr span{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.card-hdr strong{font-size:14px;font-weight:600;}
.tbl-head{display:flex;padding:0 2px 6px;border-bottom:1px solid rgba(0,0,0,.07);margin-bottom:2px;}
.tbl-head span{font-size:9px;color:#aaa;letter-spacing:.09em;text-transform:uppercase;font-weight:600;}
.cd{width:34px;flex-shrink:0;}.cn{flex:1;}.cv{width:72px;flex-shrink:0;text-align:right;}.cb{width:48px;flex-shrink:0;}
.row{display:flex;align-items:flex-start;padding:9px 2px;border-bottom:1px solid rgba(0,0,0,.06);}
.row.paid{opacity:.4;}
.row .dd{width:34px;flex-shrink:0;cursor:pointer;}
.row .dd .dn{font-size:14px;font-weight:600;line-height:1.2;}
.row .dd .dw{font-size:9px;font-weight:500;margin-top:2px;}
.row .nd{flex:1;padding-right:6px;cursor:pointer;}
.row .nd .nm{font-size:13px;line-height:1.3;}
.row .nd .nm.struck{text-decoration:line-through;color:#aaa;}
.row .nd .nc{font-size:10px;color:#aaa;margin-top:2px;}
.row .nd .np{font-size:10px;margin-top:2px;font-weight:500;}
.row .vd{width:72px;flex-shrink:0;text-align:right;font-size:12px;font-weight:600;}
.row .vd.struck{text-decoration:line-through;color:#aaa;}
.row .bd{width:48px;flex-shrink:0;display:flex;justify-content:flex-end;gap:2px;}
.btn-e,.btn-d{background:none;border:none;font-size:12px;padding:0 3px;color:#ccc;}
.btn-e.on{color:#9B72BC;}
.panel{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:12px;margin-top:4px;margin-bottom:8px;}
.panel-title{font-size:10px;color:#9B72BC;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px;}
.fg2{display:grid;grid-template-columns:60px 1fr;gap:8px;margin-bottom:8px;}
.fgeq{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.fg1{margin-bottom:8px;}
.fld label{font-size:10px;color:#aaa;display:block;margin-bottom:3px;letter-spacing:.04em;}
.fld input,.fld select{width:100%;background:#FAF8F6;border:1px solid rgba(0,0,0,.12);border-radius:6px;color:#2C2A28;font-size:14px;padding:7px 9px;outline:none;}
.fld input::placeholder{color:#ccc;}
.fld select{appearance:none;-webkit-appearance:none;}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.toggle-row label{font-size:12px;color:#666;}
.toggle-row input[type=checkbox]{width:16px;height:16px;accent-color:#9B72BC;}
.hint{font-size:11px;color:#9B72BC;font-weight:500;margin-bottom:8px;}
.btn-row{display:flex;gap:8px;}
.bsave{flex:1;padding:9px 0;background:#D9C6E8;border:none;border-radius:6px;color:#5C3D7A;font-size:13px;font-weight:600;}
.bcancel{flex:1;padding:9px 0;background:#f0efed;border:none;border-radius:6px;color:#aaa;font-size:13px;font-weight:500;}
.badd{width:100%;padding:9px 0;border:none;border-radius:6px;font-size:13px;font-weight:600;margin-top:6px;}
.simple-row{display:flex;align-items:center;padding:9px 2px;border-bottom:1px solid rgba(0,0,0,.06);}
.simple-row .sr-main{flex:1;font-size:13px;cursor:pointer;}
.simple-row .sr-val{font-size:13px;font-weight:600;white-space:nowrap;}
.simple-row .sr-val.green{color:#3D8A5A;}.simple-row .sr-val.orange{color:#C07030;}.simple-row .sr-val.inv{color:#5A72BC;}.simple-row .sr-val.struck{text-decoration:line-through;color:#aaa;}
.sec-sep{font-size:10px;color:#aaa;letter-spacing:.09em;text-transform:uppercase;font-weight:600;padding:12px 0 6px;}
.fatura-strip{display:flex;gap:8px;margin:10px 0;}
.fatura-strip .fs-box{flex:1;border-radius:8px;padding:8px 10px;text-align:center;}
.fatura-strip .fs-label{font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;margin-bottom:3px;}
.fatura-strip .fs-val{font-size:14px;font-weight:600;}
.pag-row{display:flex;align-items:center;padding:7px 2px;border-bottom:1px solid rgba(0,0,0,.05);}
.pag-row .pr-main{flex:1;font-size:12px;color:#555;}
.pag-row .pr-val{font-size:12px;font-weight:600;color:#C07030;white-space:nowrap;}
.res-block{background:#fff;border-radius:10px;border:1px solid rgba(0,0,0,.08);padding:1rem;margin-bottom:10px;}
.res-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.res-row:last-child{margin-bottom:0;}
.res-label{font-size:12px;color:#888;}
.res-val{font-size:14px;font-weight:600;}
.res-val.green{color:#3D8A5A;}.res-val.red{color:#C0392B;}.res-val.orange{color:#C07030;}.res-val.blue{color:#5A72BC;}
.res-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid rgba(0,0,0,.07);margin-top:4px;}
.res-total-label{font-size:13px;font-weight:600;color:#9B72BC;}
.res-total-val{font-size:17px;font-weight:600;}
.cat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.cat-row:last-child{border-bottom:none;}
.cat-name{font-size:12px;color:#555;}
.cat-right{display:flex;gap:10px;align-items:center;}
.cat-val{font-size:12px;font-weight:500;}
.cat-pct{font-size:11px;color:#9B72BC;font-weight:600;min-width:36px;text-align:right;}
.empty{font-size:12px;color:#ccc;text-align:center;padding:1.5rem 0;}
#loading{text-align:center;padding:2rem;font-size:13px;color:#aaa;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid transparent;background:#f0efed;color:#888;}
.chip-lbl{font-size:10px;color:#aaa;display:block;margin-bottom:5px;letter-spacing:.04em;}
.emo-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0;}
.bar-row{margin-bottom:8px;}
.bar-row .br-lbl{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:3px;}
.bar-track{height:6px;background:#f0efed;border-radius:4px;}
.bar-fill{height:6px;border-radius:4px;}
.risk-pill{display:flex;align-items:center;padding:8px 10px;border-radius:8px;margin-top:8px;font-size:12px;font-weight:600;}
.origem-tag{font-weight:600;}
</style>
</head>
<body>

<div id="hdr">
  <p class="sub">Planejamento Financeiro</p>
  <h1>Meu Planejamento</h1>
  <div class="nav">
    <button onclick="prevM()">‹</button>
    <span id="month-lbl"></span>
    <button onclick="nextM()">›</button>
  </div>
</div>

<div id="tabs">
  <button id="t-cartoes" class="active" onclick="setTab('cartoes')">Cartões</button>
  <button id="t-entradas" onclick="setTab('entradas')">Entradas</button>
  <button id="t-resumo" onclick="setTab('resumo')">Resumo</button>
</div>

<div id="loading">Carregando...</div>
<div id="content" style="display:none"></div>

<script>
function makeIcon(size){
  const c=document.createElement('canvas');c.width=c.height=size;
  const ctx=c.getContext('2d'),r=size*.18;
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
  ctx.fillStyle='#D9C6E8';ctx.fill();
  ctx.beginPath();ctx.arc(size/2,size/2,size*.38,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=size*.035;ctx.stroke();
  ctx.fillStyle='#5C3D7A';ctx.font=`600 ${size*.3}px Inter,Arial,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('MF',size/2,size*.49);
  return c.toDataURL('image/png');
}
const icon192=makeIcon(192),icon512=makeIcon(512);
document.getElementById('apple-icon').href=icon192;
document.getElementById('favicon').href=icon192;
const mBlob=new Blob([JSON.stringify({
  name:'Meu Planejamento Financeiro',short_name:'Meu Planejamento',
  start_url:'/',display:'standalone',background_color:'#FAF8F6',theme_color:'#FAF8F6',
  icons:[{src:icon192,sizes:'192x192',type:'image/png'},{src:icon512,sizes:'512x512',type:'image/png'}]
})],{type:'application/json'});
document.getElementById('manifest-link').href=URL.createObjectURL(mBlob);
</script>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue,remove,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={
  apiKey:"AIzaSyDCqpqUrFnNSunD6B9Y7d7aWytpdjGtrPc",
  authDomain:"planejador-de-gastos-silene.firebaseapp.com",
  projectId:"planejador-de-gastos-silene",
  databaseURL:"https://planejador-de-gastos-silene-default-rtdb.firebaseio.com",
  storageBucket:"planejador-de-gastos-silene.firebasestorage.app",
  messagingSenderId:"357966154830",
  appId:"1:357966154830:web:bb01110b78a95250b9871f"
};
const app=initializeApp(cfg);
const db=getDatabase(app);

const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const WD=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const CATS=["Roupa","Casa/Decoração","Livros","Beleza","Cursos","Assinatura","Saúde","Gatos","Alimentação","Saídas","Outros"];
const CARDS={
  nubank:  {label:"Nubank",   bg:"#EDE3F4",accent:"#9B72BC",text:"#5C3D7A",btn:"#D9C6E8"},
  c6:      {label:"C6",       bg:"#E2F2EA",accent:"#4A9E72",text:"#2D6B4F",btn:"#CFE6DC"},
  neon:    {label:"Neon",     bg:"#FBE9D8",accent:"#D97C3A",text:"#8B4A1F",btn:"#F4C6A6"},
  renner:  {label:"Renner",   bg:"#F5E2ED",accent:"#C0608A",text:"#7A2D5A",btn:"#EBC4D8"},
  bradesco:{label:"Bradesco", bg:"#E0EAF5",accent:"#4A72B8",text:"#1F3D6B",btn:"#C4D8F0"},
  pix:     {label:"Pix/Din.", bg:"#E4F0DE",accent:"#5A9E40",text:"#2D5A1F",btn:"#C8E4BA"},
};
const ESTADOS={
  neutro:   {label:"Neutro",    color:"#9B72BC"},
  euforico: {label:"Eufórico",  color:"#D97C3A"},
  ansioso:  {label:"Ansioso",   color:"#C9A227"},
  deprimido:{label:"Deprimido", color:"#5A72BC"},
};
const CONTEXTOS={
  necessidade:{label:"Necessidade", color:"#3D8A5A"},
  impulso:    {label:"Impulso",      color:"#C0392B"},
  planejado:  {label:"Planejado",    color:"#6B7280"},
};

const now=new Date();
let month=now.getMonth(),year=now.getFullYear();
let tab="cartoes",selCard="nubank",editId=null,showAdd=false,showAddRec=false,showAddAR=false;
let aEstado=null,aContexto=null,showChipHint=false;
let eEstado=null,eContexto=null,eIntensidade=null;
let confirmId=null,confirmY=null,confirmM=null;
let allData={};

function fmt(v){return"R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function getWD(d,m,y){return WD[new Date(y,m,d).getDay()];}
function getItems(key,y=year,m=month){
  return Object.entries(allData[y]?.[m]?.[key]||{}).map(([id,v])=>({...v,id})).sort((a,b)=>a.dia-b.dia);
}
function dbp(key,id,y=year,m=month){return`marcia/${y}/${m}/${key}/${id}`;}

function listarMesesAnteriores(){
  const lista=[];
  Object.keys(allData).forEach(yStr=>{
    const y=parseInt(yStr);
    Object.keys(allData[yStr]||{}).forEach(mStr=>{
      const m=parseInt(mStr);
      if(y<year||(y===year&&m<month))lista.push({y,m});
    });
  });
  return lista.sort((a,b)=>a.y-b.y||a.m-b.m);
}

function getAjuste(y=year,m=month){return allData[y]?.[m]?.ajuste||0;}

window.saveAjuste=()=>{
  const v=parseFloat(document.getElementById("ajuste-val").value);
  set(ref(db,`marcia/${year}/${month}/ajuste`),isNaN(v)?0:v);
};

function sobraRealDoMes(y,m){
  const totalRec=getItems("entradas",y,m).reduce((s,i)=>s+i.valor,0);
  const totalPix=getItems("pix",y,m).reduce((s,i)=>s+i.valor,0);
  const cardKeys=Object.keys(CARDS).filter(k=>k!=="pix");
  const totalPagoFaturas=cardKeys.reduce((s,k)=>s+getItems(k+"_pag",y,m).reduce((ss,i)=>ss+i.valor,0),0);
  return totalRec-totalPix-totalPagoFaturas+getAjuste(y,m);
}
function saldoAcumulado(){
  return listarMesesAnteriores().reduce((s,{y,m})=>s+sobraRealDoMes(y,m),0);
}

function getAReceberPendentes(){
  const atual=getItems("areceber").map(i=>({...i,_y:year,_m:month}));
  const anteriores=listarMesesAnteriores().flatMap(({y,m})=>getItems("areceber",y,m).map(i=>({...i,_y:y,_m:m})));
  return [...anteriores,...atual].sort((a,b)=>a._y-b._y||a._m-b._m||a.dia-b.dia);
}

function subscribe(){
  document.getElementById("loading").style.display="block";
  document.getElementById("content").style.display="none";
  onValue(ref(db,"marcia"),snap=>{
    allData=snap.val()||{};
    document.getElementById("loading").style.display="none";
    document.getElementById("content").style.display="block";
    render();
  });
}

window.prevM=()=>{month--;if(month<0){month=11;year--;}resetForms();render();};
window.nextM=()=>{month++;if(month>11){month=0;year++;}resetForms();render();};
window.setTab=(t)=>{tab=t;resetForms();render();};
window.setCard=(c)=>{selCard=c;resetForms();render();};
function resetForms(){editId=null;showAdd=false;showAddRec=false;showAddAR=false;aEstado=null;aContexto=null;showChipHint=false;eEstado=null;eContexto=null;eIntensidade=null;confirmId=null;confirmY=null;confirmM=null;}

window.toggleAdd=()=>{showAdd=!showAdd;editId=null;aEstado=null;aContexto=null;showChipHint=false;render();};
window.toggleAddRec=()=>{showAddRec=!showAddRec;render();};
window.toggleAddAR=()=>{showAddAR=!showAddAR;render();};
window.selEstado=(v)=>{aEstado=v;showChipHint=false;render();};
window.selContexto=(v)=>{aContexto=v;showChipHint=false;render();};
window.startEdit=(id)=>{
  if(editId===id){editId=null;}
  else{
    editId=id;showAdd=false;
    const item=allData[year]?.[month]?.[selCard]?.[id];
    eEstado=item?.emocional?.estado||null;
    eContexto=item?.contexto?.tipo||null;
    eIntensidade=item?.emocional?.intensidade??null;
  }
  render();
};
window.selEEstado=(v)=>{eEstado=v;render();};
window.selEContexto=(v)=>{eContexto=v;render();};
window.selEIntensidade=(v)=>{eIntensidade=v;render();};

window.togglePaid=(key,id,y=year,m=month)=>{
  const item=allData[y]?.[m]?.[key]?.[id];
  if(item)update(ref(db,dbp(key,id,y,m)),{pago:!item.pago});
};
window.delItem=(key,id,y=year,m=month)=>{remove(ref(db,dbp(key,id,y,m)));editId=null;};

window.toggleConfirmAR=(id,y,m)=>{
  if(confirmId===id){confirmId=null;}
  else{confirmId=id;confirmY=y;confirmM=m;}
  render();
};

window.confirmARParcial=(id,y,m)=>{
  const item=allData[y]?.[m]?.["areceber"]?.[id];
  if(!item)return;
  const val=parseFloat(document.getElementById("ar-confirm-val").value);
  if(isNaN(val)||val<=0)return;
  set(ref(db,dbp("entradas","id"+Date.now())),{dia:item.dia,desc:item.desc,valor:val,pago:false});
  const restante=Number((item.valor-val).toFixed(2));
  if(restante>0)update(ref(db,dbp("areceber",id,y,m)),{valor:restante});
  else remove(ref(db,dbp("areceber",id,y,m)));
  confirmId=null;
};

window.confirmAREncerrar=(id,y,m)=>{
  const item=allData[y]?.[m]?.["areceber"]?.[id];
  if(!item)return;
  const val=parseFloat(document.getElementById("ar-confirm-val").value);
  if(isNaN(val)||val<0)return;
  set(ref(db,dbp("entradas","id"+Date.now())),{dia:item.dia,desc:item.desc,valor:val,pago:false});
  remove(ref(db,dbp("areceber",id,y,m)));
  confirmId=null;
};

window.saveEdit=(key,id)=>{
  const dia=parseInt(document.getElementById("e-dia").value);
  const desc=document.getElementById("e-desc").value.trim();
  const cat=document.getElementById("e-cat").value;
  const val=parseFloat(document.getElementById("e-val").value);
  const tag=document.getElementById("e-tag")?.value.trim()||"";
  const essencial=document.getElementById("e-essencial")?.checked||false;
  if(!dia||!desc||isNaN(val))return;
  update(ref(db,dbp(key,id)),{
    dia,desc,cat,valor:val,
    emocional:{estado:eEstado,intensidade:eIntensidade},
    contexto:{tipo:eContexto,tag},
    meta:{essencial}
  });
  editId=null;
};

window.addCard=()=>{
  const dia=parseInt(document.getElementById("a-dia").value);
  const desc=document.getElementById("a-desc").value.trim();
  const cat=document.getElementById("a-cat").value;
  const parc=document.getElementById("a-parc").checked;
  if(!dia||!desc)return;
  if(!aEstado||!aContexto){showChipHint=true;render();return;}
  const emocional={estado:aEstado,intensidade:null};
  const contexto={tipo:aContexto,tag:""};
  const meta={essencial:null};
  if(parc){
    const total=parseFloat(document.getElementById("a-total").value);
    const nparc=parseInt(document.getElementById("a-nparc").value);
    if(isNaN(total)||isNaN(nparc)||nparc<1)return;
    const vp=total/nparc;
    for(let i=0;i<nparc;i++){
      let m=month+i,y=year;
      while(m>11){m-=12;y++;}
      set(ref(db,`marcia/${y}/${m}/${selCard}/id${Date.now()}_${i}`),{dia,desc,cat,valor:parseFloat(vp.toFixed(2)),parcela_atual:i+1,parcelas_total:nparc,pago:false,emocional,contexto,meta});
    }
  }else{
    const val=parseFloat(document.getElementById("a-val").value);
    if(isNaN(val))return;
    set(ref(db,dbp(selCard,"id"+Date.now())),{dia,desc,cat,valor:val,pago:false,emocional,contexto,meta});
  }
  showAdd=false;aEstado=null;aContexto=null;showChipHint=false;
};

window.addEntrada=(key)=>{
  const dia=parseInt(document.getElementById(`s-dia-${key}`).value);
  const desc=document.getElementById(`s-desc-${key}`).value.trim();
  const val=parseFloat(document.getElementById(`s-val-${key}`).value);
  if(!dia||!desc||isNaN(val))return;
  let nrep=1;
  if(key==="areceber"){

function media(arr){return arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:0;}
function desvioPadrao(arr,m){
  if(arr.length===0)return 0;
  const variancia=arr.reduce((s,v)=>s+Math.pow(v-m,2),0)/arr.length;
  return Math.sqrt(variancia);
}

function todosLancamentosComValor(){
  const todos=[];
  Object.keys(allData).forEach(yStr=>{
    Object.keys(allData[yStr]||{}).forEach(mStr=>{
      Object.keys(CARDS).forEach(k=>{
        getItems(k,parseInt(yStr),parseInt(mStr)).forEach(i=>todos.push(i));
      });
    });
  });
  return todos;
}

function analisarComportamentoMes(){
  const itens=Object.keys(CARDS).flatMap(k=>getItems(k)).filter(i=>i.emocional?.estado);
  const total=itens.length;
  if(total===0)return null;
  const impulso=itens.filter(i=>i.contexto?.tipo==="impulso").length;
  const euforico=itens.filter(i=>i.emocional?.estado==="euforico").length;
  const deprimido=itens.filter(i=>i.emocional?.estado==="deprimido").length;
  const riscoImpulso=impulso/total,picoEuforico=euforico/total,picoDepressivo=deprimido/total;
  let padraoAtivo="estável";
  if(riscoImpulso>0.3&&picoEuforico>=picoDepressivo)padraoAtivo="alto risco — euforia";
  else if(riscoImpulso>0.3&&picoDepressivo>picoEuforico)padraoAtivo="alto risco — queda de humor";
  else if(riscoImpulso>0.3)padraoAtivo="alto risco — impulso";
  return{total,riscoImpulso,picoEuforico,picoDepressivo,padraoAtivo};
}

function calcularRiscoMes(){
  const valoresGlobais=todosLancamentosComValor().map(i=>i.valor);
  const mediaG=media(valoresGlobais),dpG=desvioPadrao(valoresGlobais,mediaG);
  const itensMes=Object.keys(CARDS).flatMap(k=>getItems(k));
  if(itensMes.length===0)return 0;
  const soma=itensMes.reduce((acc,i)=>{
    const alterado=i.emocional?.estado==="euforico"||i.emocional?.estado==="deprimido";
    if(!alterado)return acc;
    const z=dpG>0?(i.valor-mediaG)/dpG:0;
    const intensidadeNorm=(i.emocional.intensidade??0)/3;
    return acc+intensidadeNorm+Math.max(z,0);
  },0);
  return soma/itensMes.length;
}

function renderMapaEmocional(){
  const analise=analisarComportamentoMes();
  if(!analise)return`<div class="res-block"><p style="font-size:10px;color:#aaa;letter-spacing:.09em;text-transform:uppercase;font-weight:600;margin-bottom:8px">Mapa emocional do mês</p><p class="empty">Nenhum lançamento com contexto emocional ainda</p></div>`;
  const risco=calcularRiscoMes();
  const corRisco=risco>1?"#C0392B":risco>0.3?"#D97C3A":"#3D8A5A";
  const bars=[
    {k:"picoEuforico",label:"Eufórico",color:"#D97C3A"},
    {k:"picoDepressivo",label:"Deprimido",color:"#5A72BC"},
    {k:"riscoImpulso",label:"Por impulso",color:"#C0392B"},
  ];
  const barsHtml=bars.map(b=>{
    const pct=Math.round(analise[b.k]*100);
    return`<div class="bar-row">
      <div class="br-lbl"><span>${b.label}</span><span>${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${b.color}"></div></div>
    </div>`;
  }).join("");
  const corFundoPadrao=analise.padraoAtivo==="estável"?"#E2F2EA":"#FBE9D8";
  const corTextoPadrao=analise.padraoAtivo==="estável"?"#2D6B4F":"#8B4A1F";
  return`<div class="res-block">
    <p style="font-size:10px;color:#9B72BC;letter-spacing:.09em;text-transform:uppercase;font-weight:600;margin-bottom:10px">Mapa emocional do mês</p>
    ${barsHtml}
    <div class="risk-pill" style="background:${corFundoPadrao};color:${corTextoPadrao}">Padrão ativo: ${analise.padraoAtivo}</div>
    <div class="risk-pill" style="background:${corRisco}22;color:${corRisco}">Score de risco do mês: ${risco.toFixed(2)}</div>
  </div>`;
}

  let totalCartoes=0;

  CATS.forEach(c=>catTotals[c]=0);

  Object.keys(CARDS).forEach(k=>{
    getItems(k).forEach(i=>{
      totalCartoes+=(k==="pix"?0:i.valor);
      if(catTotals[i.cat]!==undefined)catTotals[i.cat]+=i.valor;
      else catTotals["Outros"]=(catTotals["Outros"]||0)+i.valor;
    });
  });

  const totalGasto=Object.keys(CARDS).reduce((s,k)=>s+getItems(k).reduce((ss,i)=>ss+i.valor,0),0);
  const totalPix=getItems("pix").reduce((s,i)=>s+i.valor,0);
  const totalPagoFaturas=cardKeys.reduce((s,k)=>s+getItems(k+"_pag").reduce((ss,i)=>ss+i.valor,0),0);
  const totalEmAberto=Math.max(0,totalCartoes-totalPagoFaturas);
  const totalRec=getItems("entradas").reduce((s,i)=>s+i.valor,0);
  const pendentesAR=getAReceberPendentes();
  const totalAR=pendentesAR.reduce((s,i)=>s+i.valor,0);
  const saldoAnterior=saldoAcumulado();
  const sobraMesAtual=sobraRealDoMes(year,month);
  const sobraReal=saldoAnterior+sobraMesAtual;
  const sobraPrevisao=saldoAnterior+sobraMesAtual+totalAR;

  const catRows=Object.entries(catTotals).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a).map(([cat,val])=>{
    const pct=totalGasto>0?((val/totalGasto)*100).toFixed(1):0;
    return`<div class="cat-row"><span class="cat-name">${cat}</span><div class="cat-right"><span class="cat-val">${fmt(val)}</span><span class="cat-pct">${pct}%</span></div></div>`;
  }).join("")||`<p class="empty">Sem gastos no mês</p>`;

  const cardRows=cardKeys.map(k=>{
    const fatura=getItems(k).reduce((s,i)=>s+i.valor,0);
    const pago=getItems(k+"_pag").reduce((s,i)=>s+i.valor,0);
    const aberto=Math.max(0,fatura-pago);
    if(fatura===0)return"";
    const v=CARDS[k];
    return`<div style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05)">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;font-weight:600;color:${v.text}">${v.label}</span>
        <span style="font-size:12px;font-weight:600">${fmt(fatura)}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:11px;color:#3D8A5A">Pago: ${fmt(pago)}</span>
        <span style="font-size:11px;color:${aberto>0?'#C07030':'#3D8A5A'}">Em aberto: ${fmt(aberto)}</span>
      </div>
    </div>`;
  }).join("");

  return`<div class="section" style="padding-bottom:1.5rem">
    <div class="res-block">
      <div class="res-row"><span class="res-label">📦 Saldo de meses anteriores</span><span class="res-val ${saldoAnterior>=0?'green':'red'}">${fmt(saldoAnterior)}</span></div>
      <div class="res-row"><span class="res-label">✅ Recebido este mês</span><span class="res-val green">${fmt(totalRec)}</span></div>
      <div class="res-row"><span class="res-label">⏳ A receber (acumulado)</span><span class="res-val orange">${fmt(totalAR)}</span></div>
      <div class="res-row"><span class="res-label">💸 Pix / Dinheiro gasto</span><span class="res-val red">${fmt(totalPix)}</span></div>
      <div class="res-row"><span class="res-label">💳 Faturas pagas</span><span class="res-val red">${fmt(totalPagoFaturas)}</span></div>
      <div class="res-row"><span class="res-label">⏳ Faturas em aberto</span><span class="res-val orange">${fmt(totalEmAberto)}</span></div>
      <div class="res-row" style="align-items:center">
        <span class="res-label">🔧 Ajuste manual deste mês</span>
        <div style="display:flex;gap:6px;align-items:center">
          <input id="ajuste-val" type="number" step="0.01" value="${getAjuste()}" style="width:84px;background:#FAF8F6;border:1px solid rgba(0,0,0,.12);border-radius:6px;color:#2C2A28;font-size:13px;padding:5px 7px;text-align:right">
          <button onclick="saveAjuste()" style="background:#D9C6E8;border:none;border-radius:6px;color:#5C3D7A;font-size:11px;font-weight:600;padding:6px 10px">Salvar</button>
        </div>
      </div>
      <p style="font-size:10px;color:#bbb;margin-top:-4px;margin-bottom:8px">Use só se o saldo real não bater com o calculado. Entra na conta deste mês e se carrega pros meses seguintes.</p>
      <div class="res-total-row">
        <span class="res-total-label">Sobra real</span>
        <span class="res-total-val" style="color:${sobraReal>=0?'#3D8A5A':'#C0392B'}">${fmt(sobraReal)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <span style="font-size:11px;color:#aaa">Sobra se tudo entrar</span>
        <span style="font-size:13px;font-weight:600;color:${sobraPrevisao>=0?'#7AB89A':'#C0392B'}">${fmt(sobraPrevisao)}</span>
      </div>
    </div>
    ${cardRows?`<div class="res-block"><p style="font-size:10px;color:#aaa;letter-spacing:.09em;text-transform:uppercase;font-weight:600;margin-bottom:8px">Faturas por cartão</p>${cardRows}</div>`:""}
    <div class="res-block">
      <p style="font-size:10px;color:#aaa;letter-spacing:.09em;text-transform:uppercase;font-weight:600;margin-bottom:10px">Gasto por categoria</p>
      ${catRows}
    </div>
    ${renderMapaEmocional()}
  </div>`;
}

function render(){
  document.getElementById("month-lbl").textContent=MONTHS[month]+" · "+year;
  ["cartoes","entradas","resumo"].forEach(t=>{document.getElementById("t-"+t).className=tab===t?"active":"";});
  let html="";
  if(tab==="cartoes")html=renderCartoes();
  else if(tab==="entradas")html=renderEntradas();
  else if(tab==="resumo")html=renderResumo();
  document.getElementById("content").innerHTML=html;
}

subscribe();
</script>
</body>
</html>
